<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Слайдер</title>
    <link rel="stylesheet" href="css/slider.css">
</head>
<body>
    <div class="slider-container">
        <h2>Слайдер изображений</h2>
        <div class="slider">
            <button class="slider-btn prev-btn" id="prevBtn">❮</button>
            <div class="slider-image-wrapper">
                <img src="" alt="Изображение 1" id="sliderImage">
            </div>
            <button class="slider-btn next-btn" id="nextBtn">❯</button>
        </div>
        <p class="image-counter" id="imageCounter">1 / 5</p>
    </div>

    <script src="js/slider.js"></script>
</body>
</html>
