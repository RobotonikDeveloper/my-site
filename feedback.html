<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музей | СПК</title>
    <link rel="stylesheet" href="style.css">
    <style>
        section{
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <header>
        <br>
        <img src="img/63d38814a8f69232256323.jpg" alt="" width="5%" height="aute" style="border-radius: 15px; border-style: solid;">
        <br>
        <a style="text-decoration: none;" href="index.html"><h1>МУЗЕЙ</h1></a>
        <br>
        <nav>
            <a class="a-btn" href="expositions.html">Экспозиции</a>
            <a class="a-btn" href="gallery.html">Галерея</a>
            <a class="a-btn" href="about.html">О нас</a>
            <a class="a-btn" href="feedback.html">Обратная связь</a>
        </nav>
        <br>
    </header>
    <main style="align-items: center;">
        <section>
            <br>
            <h2 style="text-align: center; color: #294d91;">Форма обратной связи</h2>
            <form action="#" method="post">
                <div>
                    <label style="color: #294d91;" for="name">Имя *</label>
                    <input style="color: #294d91;" type="text" id="name" name="name" required>
                </div>
                <div>
                    <label style="color: #294d91;" for="email">Email *</label>
                    <input style="color: #294d91;" type="email" id="email" name="email" required>
                </div>
                <div>
                    <label style="color: #294d91;" for="subject">Тема</label>
                    <select name="subject" id="subject" style="color: #294d91;">
                        <option style="color: #294d91;" value="report">Жалоба</option>
                        <option style="color: #294d91;" value="suggestion">Предложение</option>
                        <option style="color: #294d91;" value="feedback">Отзыв</option>
                        <option style="color: #294d91;" value="other">Другое</option>
                    </select>
                </div>
                <div>
                    <label style="color: #294d91;" for="message">Сообщение *</label>
                    <textarea style="color: #294d91;" id="message" name="message" rows="5" required></textarea>
                </div>
                <div>
                    <button style="color: #294d91;" type="submit">Отправить</button>
                </div>
            </form>
            
        </section>
    </main>
</body>
</html>
