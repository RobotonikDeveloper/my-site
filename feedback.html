<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обратная связь</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon">
</head>
<body>
    <header>
        <a href="index.html"><img src="img/logo.png" alt="Лого" class="logo" width="15%" height="auto"></a>
        <nav>
            <a href="gallery.html">Галерея</a>
            <a href="expositions.html">Экспозиции</a>
            <a href="about.html">О нас</a>
            <a href="feedback.html">Обратная связь</a>
        </nav>
    </header>
    <main>
        <br>
        <h1 style="text-align: center; color: #3f4f6d;">Обратная связь</h1>
        <br>
        <div style="display: flex; flex-direction: column; align-items: center;">
            <form action="#" method="post">
                <div>
                    <label style="color: #3f4f6d;" for="name">Имя *</label>
                    <input style="color: #3f4f6d;" type="text" id="name" name="name" required>
                </div>
                <div>
                    <label style="color: #3f4f6d;" for="email">Email *</label>
                    <input style="color: #3f4f6d;" type="email" id="email" name="email" required>
                </div>
                <div>
                    <label style="color: #3f4f6d;" for="subject">Тема</label>
                    <select name="subject" id="subject" style="color: #3f4f6d;">
                        <option style="color: #3f4f6d;" value="report">Жалоба</option>
                        <option style="color: #3f4f6d;" value="suggestion">Предложение</option>
                        <option style="color: #3f4f6d;" value="feedback">Отзыв</option>
                        <option style="color: #3f4f6d;" value="other">Другое</option>
                    </select>
                </div>
                <div>
                    <label style="color: #3f4f6d;" for="message">Сообщение *</label>
                    <textarea style="color: #3f4f6d;" id="message" name="message" rows="5" required></textarea>
                </div>
                <div>
                    <button style="color: #3f4f6d;" type="submit">Отправить</button>
                </div>
            </form>
        </div>
    </main>
    <footer>
        <p>&copy; Музей СПК</p>
    </footer>
</body>
</html>
